name: "iOS Release"

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-ios:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-ios

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize iOS & Inject Permissions
        run: |
          echo "Initializing iOS..."
          npm run tauri add os
          npm run tauri ios init
          
          echo "Injecting Permissions..."
          PLIST=$(find src-tauri/gen/apple -path "*_iOS/Info.plist" | head -n 1)
          if [ -n "$PLIST" ] && [ -f "$PLIST" ]; then
            echo "Found Info.plist at: $PLIST"
            plutil -insert UIFileSharingEnabled -bool YES "$PLIST"
            plutil -insert LSSupportsOpeningDocumentsInPlace -bool YES "$PLIST"
          else
            echo "Warning: Info.plist not found!"
          fi

      - name: Disable Xcode Code Signing
        run: |
          python3 -c "
          import os
          import textwrap
          
          pbx = 'src-tauri/gen/apple/rodroid-il2cppdumper.xcodeproj/project.pbxproj'
          if os.path.exists(pbx):
              with open(pbx, 'r') as f:
                  data = f.read()
              data = data.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')
              
              disabled_settings = textwrap.dedent('''\
              buildSettings = {
              \t\t\t\tCODE_SIGNING_ALLOWED = \"NO\";
              \t\t\t\tCODE_SIGNING_REQUIRED = \"NO\";
              \t\t\t\tCODE_SIGN_IDENTITY = \"\";''')
              
              data = data.replace('buildSettings = {', disabled_settings)
              
              with open(pbx, 'w') as f:
                  f.write(data)
              print('Successfully patched project.pbxproj to disable code signing')
          else:
              print('Warning: project.pbxproj not found!')
          "

      - name: Build iOS App (Device)
        run: |
          echo "Installing Device Target..."
          rustup target add aarch64-apple-ios
          
          export CODE_SIGNING_ALLOWED="NO"
          export CODE_SIGNING_REQUIRED="NO"
          export CODE_SIGN_IDENTITY=""
          
          echo "Building physical device..."
          npx tauri ios build --target aarch64-apple-ios || true
          
          mkdir -p Payload_Device
          APP_DIR=$(find src-tauri/gen/apple -path "*iphoneos/*.app" | head -n 1)
          if [ -n "$APP_DIR" ]; then
            cp -R "$APP_DIR" Payload_Device/
            cd Payload_Device
            zip -qr ../Rodroid_IL2CPPDumper_iOS_unsigned.ipa *.app
            cd ..
          else
            echo "Warning: No physical device .app found! (iphoneos build)"
          fi

      - name: Build iOS App (Simulator)
        run: |
          echo "Installing Simulator Target..."
          rustup target add aarch64-apple-ios-sim
          
          export CODE_SIGNING_ALLOWED="NO"
          export CODE_SIGNING_REQUIRED="NO"
          export CODE_SIGN_IDENTITY=""
          
          echo "Building Simulator..."
          npx tauri ios build --target aarch64-apple-ios-sim || true
          
          mkdir -p Payload_Sim
          APP_DIR=$(find src-tauri/gen/apple -path "*iphonesimulator/*.app" | head -n 1)
          if [ -n "$APP_DIR" ]; then
            cp -R "$APP_DIR" Payload_Sim/
            cd Payload_Sim
            zip -qr ../Rodroid_IL2CPPDumper_iOS_Simulator.zip *.app
            cd ..
          else
            echo "Warning: No simulator device .app found! (iphonesimulator build)"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Builds
          path: |
            Rodroid_IL2CPPDumper_iOS_unsigned.ipa
            Rodroid_IL2CPPDumper_iOS_Simulator.zip
          retention-days: 7

      - name: Upload to Release (If tag exists)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          
          # Only try to upload to release if the release actually exists in GitHub!
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "Release v$VERSION found. Uploading..."
            sleep 15 
            
            if [ -f "Rodroid_IL2CPPDumper_iOS_unsigned.ipa" ]; then
              gh release upload "v$VERSION" Rodroid_IL2CPPDumper_iOS_unsigned.ipa --clobber
            fi
            
            if [ -f "Rodroid_IL2CPPDumper_iOS_Simulator.zip" ]; then
              gh release upload "v$VERSION" Rodroid_IL2CPPDumper_iOS_Simulator.zip --clobber
            fi
          else
            echo "Release v$VERSION does not exist yet. Skipping release upload."
            echo "You can download the build files from the artifacts on this Action run page!"
          fi
