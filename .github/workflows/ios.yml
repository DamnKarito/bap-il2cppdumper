name: "iOS Release"

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-ios:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize iOS & Inject Permissions
        run: |
          npm run tauri add os
          npm run tauri ios init

          PLIST=$(find src-tauri/gen/apple -path "*_iOS/Info.plist" | head -n 1)
          if [ -n "$PLIST" ] && [ -f "$PLIST" ]; then
            plutil -insert UIFileSharingEnabled -bool YES "$PLIST"
            plutil -insert LSSupportsOpeningDocumentsInPlace -bool YES "$PLIST"
            echo "Injected file sharing permissions into $PLIST"
          fi

      - name: Disable Xcode Code Signing in project
        run: |
          python3 << 'PYEOF'
          import glob, re

          for pbx in glob.glob("src-tauri/gen/apple/*.xcodeproj/project.pbxproj"):
              with open(pbx, "r") as f:
                  data = f.read()

              data = data.replace("CODE_SIGN_STYLE = Automatic;", "CODE_SIGN_STYLE = Manual;")

              inject = (
                  'buildSettings = {\n'
                  '\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n'
                  '\t\t\t\tCODE_SIGNING_REQUIRED = NO;\n'
                  '\t\t\t\tCODE_SIGN_IDENTITY = "";\n'
                  '\t\t\t\tDEVELOPMENT_TEAM = "";'
              )
              data = data.replace("buildSettings = {", inject)

              data = re.sub(
                  r'DEVELOPMENT_TEAM = "[^"]*";',
                  'DEVELOPMENT_TEAM = "";',
                  data,
              )

              with open(pbx, "w") as f:
                  f.write(data)
              print(f"Patched {pbx}")
          PYEOF

      - name: Build iOS (Device - aarch64)
        run: |
          npx tauri ios build --target aarch64 || true

          echo "=== Searching for .xcarchive ==="
          find src-tauri/gen/apple -name "*.xcarchive" -type d 2>/dev/null || true

          echo "=== Searching for .app inside xcarchive ==="
          find src-tauri/gen/apple -path "*.xcarchive/Products/Applications/*.app" -type d 2>/dev/null || true

          echo "=== Searching for any .app ==="
          find src-tauri/gen/apple -name "*.app" -type d 2>/dev/null || true

          ARCHIVE_APP=$(find src-tauri/gen/apple -path "*.xcarchive/Products/Applications/*.app" -type d | head -n 1)

          if [ -z "$ARCHIVE_APP" ]; then
            ARCHIVE_APP=$(find src-tauri/gen/apple -name "*.app" -type d | head -n 1)
          fi

          if [ -n "$ARCHIVE_APP" ]; then
            echo "Found device .app at: $ARCHIVE_APP"
            mkdir -p Payload
            cp -R "$ARCHIVE_APP" Payload/
            zip -qr Rodroid_IL2CPPDumper_iOS_unsigned.ipa Payload
            echo "Device IPA created successfully"
          else
            echo "WARNING: No device .app found"
          fi

      - name: Build iOS (Simulator - aarch64-sim)
        run: |
          npx tauri ios build --target aarch64-sim || true

          echo "=== Searching for simulator .app ==="
          find src-tauri/gen/apple -name "*.app" -type d 2>/dev/null || true

          SIM_APP=$(find src-tauri/gen/apple -path "*.xcarchive/Products/Applications/*.app" -type d | head -n 1)

          if [ -z "$SIM_APP" ]; then
            SIM_APP=$(find src-tauri/gen/apple -name "*.app" -type d | head -n 1)
          fi

          if [ -n "$SIM_APP" ]; then
            echo "Found simulator .app at: $SIM_APP"
            zip -qr Rodroid_IL2CPPDumper_iOS_Simulator.zip "$SIM_APP"
            echo "Simulator zip created successfully"
          else
            echo "WARNING: No simulator .app found"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Builds
          path: |
            Rodroid_IL2CPPDumper_iOS_unsigned.ipa
            Rodroid_IL2CPPDumper_iOS_Simulator.zip
          retention-days: 7
          if-no-files-found: warn

      - name: Upload to Release (If tag exists)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")

          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "Release v$VERSION found. Uploading..."

            if [ -f "Rodroid_IL2CPPDumper_iOS_unsigned.ipa" ]; then
              gh release upload "v$VERSION" Rodroid_IL2CPPDumper_iOS_unsigned.ipa --clobber
            fi

            if [ -f "Rodroid_IL2CPPDumper_iOS_Simulator.zip" ]; then
              gh release upload "v$VERSION" Rodroid_IL2CPPDumper_iOS_Simulator.zip --clobber
            fi
          else
            echo "Release v$VERSION does not exist. Download from Action artifacts instead."
          fi
