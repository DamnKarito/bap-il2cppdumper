name: "Release"

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-and-publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Rodroid IL2CPP Dumper v__VERSION__"
          releaseBody: "See the assets below to download and install this release."
          releaseDraft: true
          prerelease: false

      - name: Build and Upload iOS Unsigned IPA
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: ""
        run: |
          echo "Initializing iOS..."
          npm run tauri add os
          npm run tauri ios init
          
          echo "Injecting Permissions..."
          PLIST="src-tauri/gen/apple/Rodroid IL2CPP Dumper_iOS/Info.plist"
          plutil -insert UIFileSharingEnabled -bool YES "$PLIST"
          plutil -insert LSSupportsOpeningDocumentsInPlace -bool YES "$PLIST"
          
          echo "Installing iOS Rust Target..."
          rustup target add aarch64-apple-ios
          
          echo "Building iOS App..."
          # Tauri will invoke xcodebuild. We use '|| true' to suppress failure if it crashes at final code-signing stage. The .app is already fully baked!
          npm run tauri ios build || true
          
          echo "Packaging Payload..."
          mkdir -p Payload
          # Locate the built .app dynamically
          APP_DIR=$(find src-tauri/gen/apple -name "*.app" | head -n 1)
          if [ -z "$APP_DIR" ]; then
            echo "Error: Could not find generated .app bundle."
            exit 1
          fi
          cp -R "$APP_DIR" Payload/
          zip -qr Rodroid_IL2CPPDumper_iOS_unsigned.ipa Payload
          
          echo "Uploading to Release..."
          VERSION=$(node -p "require('./package.json').version")
          gh release upload "v$VERSION" Rodroid_IL2CPPDumper_iOS_unsigned.ipa --clobber

